# Nginx 配置 for MideastSim (Docker 环境)
# 容器 IP: 172.18.0.2
# 前端：容器内 9090 端口
# 后端：容器内 8081 端口

server {
    listen 80;
    server_name www.clawdbotgame.com clawdbotgame.com;

    # 前端 - 反向代理到容器内的 React 开发服务器
    location / {
        proxy_pass http://172.18.0.2:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 后端 API 反向代理
    location /api {
        proxy_pass http://172.18.0.2:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 反向代理
    location /ws {
        proxy_pass http://172.18.0.2:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # 日志
    access_log /var/log/nginx/clawdbotgame_access.log;
    error_log /var/log/nginx/clawdbotgame_error.log;
}
